<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANIMATIONS - Marco Zagara</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      background: #000;
      color: #fff;
      font-family: "Space Mono", monospace;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }
    .wip {
      margin: 0;
      padding: 0;
      text-align: center;
      font-size: clamp(28px, 6vw, 50px);
      letter-spacing: 0.08em;
      line-height: 1.1;
      text-transform: uppercase;
    }

    .wip-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      margin-top: 300px;
    }

    .wip-icon {
      width: clamp(40px, 6vw, 56px);
      height: auto;
      display: block;
      color: #ffffff;
    }

    .wip-note {
      margin: 0;
      font-family: "Rubik", sans-serif;
      font-size: clamp(14px, 2vw, 20px);
      text-align: center;
      line-height: 1.4;
    }

    .wip-note a {
      color: #ffffff;
      text-decoration: underline;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="wip-wrap">
    <h1 class="wip">WORK IN PROGRESS</h1>
    <svg class="wip-icon" viewBox="0 0 64 64" aria-hidden="true">
      <path fill="currentColor" d="M54 36v-8l-5.5-1.8a17 17 0 0 0-1.7-4.1l2.6-5.2-5.7-5.7-5.2 2.6a17 17 0 0 0-4.1-1.7L32 6h-8l-1.8 5.5a17 17 0 0 0-4.1 1.7l-5.2-2.6-5.7 5.7 2.6 5.2a17 17 0 0 0-1.7 4.1L2 28v8l5.5 1.8a17 17 0 0 0 1.7 4.1l-2.6 5.2 5.7 5.7 5.2-2.6a17 17 0 0 0 4.1 1.7L24 58h8l1.8-5.5a17 17 0 0 0 4.1-1.7l5.2 2.6 5.7-5.7-2.6-5.2a17 17 0 0 0 1.7-4.1zM28 40a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"/>
    </svg>
    <p class="wip-note">
      In the meantime feel free to keep browsing the <a href="index.html">site</a> or visit my <a href="https://instagram.com/marcozagara" target="_blank" rel="noopener noreferrer">instagram</a>
    </p>
  </div>
</body>
</html>
